source = ./colors.conf

general {
    grace = 300
    hide_cursor = true
}

background {
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

input-field {
    size = 200, 50
    position = 0, -80
    monitor =
    dots_center = true
    fade_on_empty = false
    font_color = $font_color
    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 5
    placeholder_text = password...
    shadow_passes = 2
}
